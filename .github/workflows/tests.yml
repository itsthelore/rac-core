name: Python bridge

# Rust is the product engine and owns normal behavioral CI. Python is tested
# only as the packaging/SDK bridge; the bounded retirement oracle lives in the
# native Rust workflow against rac-spec.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  bridge:
    name: packaging + SDK (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install bridge test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff

      - name: Lint maintained bridge surfaces
        run: >-
          python -m ruff check
          src/asdecided/__init__.py
          src/asdecided/dispatch.py
          src/asdecided/release.py
          tests/test_dispatch.py
          tests/test_sdk_surface.py
          tests/test_release_version.py

      - name: Test packaging and SDK contract
        run: >-
          python -m pytest -q
          tests/test_dispatch.py
          tests/test_sdk_surface.py
          tests/test_release_version.py
