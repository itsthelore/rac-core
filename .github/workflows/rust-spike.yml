# Native Rust CI. Contract bytes are owned by rac-spec; the evolving RAC
# repository corpus is exercised through invariants rather than snapshots.

name: rust-spike

on:
  pull_request:
    paths:
      - "rust/**"
      - "rac/**"
      - "src/rac/**"
      - "pyproject.toml"
      - ".github/workflows/rust-spike.yml"
  push:
    branches: [main]
    paths:
      - "rust/**"
      - "rac/**"
      - "src/rac/**"
      - "pyproject.toml"
      - ".github/workflows/rust-spike.yml"

jobs:
  rust-contract:
    name: Rust contract + live-corpus invariants
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rust toolchain (pinned by rust/rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build native release binaries
        working-directory: rust
        run: cargo build --release --locked

      # Keep the Linux-only event-watch correctness gate independently visible
      # before the broader workspace suite.
      - name: Freshness tracker (Linux inotify + stat fallback)
        working-directory: rust
        run: cargo test -p rac-engine --test freshness_tracker --release

      - name: Rust workspace unit and bounded regression suites
        working-directory: rust
        run: cargo test --workspace --release

      - name: Clippy (strict across native targets)
        working-directory: rust
        run: cargo clippy --release --no-deps -- -D warnings

      - name: Checkout authoritative rac-spec fixtures
        uses: actions/checkout@v4
        with:
          repository: itsthelore/rac-spec
          path: rac-spec

      - name: Guard 1 — vendored registry matches rac-spec
        env:
          RAC_SPEC_DIR: ${{ github.workspace }}/rac-spec
        run: python rust/spec/sync_spec.py

      - name: Guard 2 — Rust reproduces rac-spec contract bytes
        run: |
          python rust/tools/conformance_certify.py \
            --spec-dir "${{ github.workspace }}/rac-spec" \
            --engine "rust=${{ github.workspace }}/rust/target/release/rac"

      - name: Live RAC corpus invariants
        run: |
          python rust/tools/live_corpus_invariants.py \
            --engine rust/target/release/rac \
            --corpus rac

  retirement-certification:
    name: Bounded Python retirement certification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rust toolchain (pinned by rust/rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build frozen Python retirement oracle
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: 0.1.dev50+g21c8be403
        run: |
          python -m venv .venv-retirement
          .venv-retirement/bin/pip install --quiet -e .
          .venv-retirement/bin/rac --version

      - name: Build native release binary
        working-directory: rust
        run: cargo build --release --locked -p rac

      - name: Checkout authoritative rac-spec fixtures
        uses: actions/checkout@v4
        with:
          repository: itsthelore/rac-spec
          path: rac-spec

      - name: Both engines reproduce the bounded rac-spec suite
        run: |
          python rust/tools/conformance_certify.py \
            --spec-dir "${{ github.workspace }}/rac-spec" \
            --engine "python=${{ github.workspace }}/.venv-retirement/bin/rac" \
            --engine "rust=${{ github.workspace }}/rust/target/release/rac"
