# CI for the native-engine spike (rust/): build, unit/vector tests, and the
# byte-parity gates against the Python oracle built from this same checkout.
#
# Not yet a required check (ADR-075 governs promotion to the merge gate);
# runs only when rust/ or this workflow changes.
#
# Version seam: the parity case lists pin RAC_RS_VERSION to the oracle
# version the cases were authored against; SETUPTOOLS_SCM_PRETEND_VERSION
# makes the CI-installed oracle report exactly that version so --version
# and export cases compare real bytes (see rust/PORT-CONTRACT.md, decision 6).

name: rust-spike

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-spike.yml"
  push:
    branches: [claude/rac-mcp-http-spike] # PR branches are covered by pull_request
    paths:
      - "rust/**"
      - ".github/workflows/rust-spike.yml"

jobs:
  build-test-parity:
    name: cargo test + CLI/MCP parity (mainline oracle)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rust toolchain (pinned by rust/rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build the Python oracle (pinned version seam)
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: 0.1.dev50+g21c8be403
        run: |
          python -m venv .venv-oracle
          .venv-oracle/bin/pip install --quiet -e . "mcp==1.28.1" "pydantic==2.13.4"
          .venv-oracle/bin/rac --version

      - name: cargo build --release
        working-directory: rust
        run: cargo build --release --locked

      - name: cargo test (unit + oracle vector suites)
        working-directory: rust
        run: cargo test -p rac-engine --release

      - name: clippy (strict across the workspace)
        working-directory: rust
        run: cargo clippy --release --no-deps -- -D warnings

      - name: CLI byte-parity vs oracle (mainline cases, twice)
        working-directory: rust
        run: |
          target/release/parity-harness \
            --engine-a ../.venv-oracle/bin/rac --engine-b target/release/rac \
            --cases parity-cases.json --scoreboard-dir parity-out
          target/release/parity-harness \
            --engine-a ../.venv-oracle/bin/rac --engine-b target/release/rac \
            --cases parity-cases.json --scoreboard-dir parity-out-2
          diff -r parity-out parity-out-2

      - name: CLI byte-parity vs oracle (closure battery)
        working-directory: rust
        run: |
          target/release/parity-harness \
            --engine-a ../.venv-oracle/bin/rac --engine-b target/release/rac \
            --cases parity-cases-closure.json --scoreboard-dir parity-out-closure

      - name: MCP wire parity vs oracle (five-tool cases)
        working-directory: rust
        run: |
          python3 tools/mcp_parity.py \
            --engine-a "$(pwd)/../.venv-oracle/bin/rac mcp" \
            --engine-b "$(pwd)/target/release/rac-mcp" \
            --exclude-tags six,list --out mcp-parity-out

      - name: MCP HTTP transport parity vs oracle (body + status + audit)
        working-directory: rust
        run: |
          python3 tools/mcp_http_parity.py \
            --engine-a "$(pwd)/../.venv-oracle/bin/rac mcp" \
            --engine-b "$(pwd)/target/release/rac-mcp" \
            --out mcp-http-out

      # ADR-063 Guards, activated (native-engine cutover): the shared spec must
      # match rac-spec, and both engines must reproduce rac-spec's conformance
      # goldens. RAC_SPEC_DIR points these gates at a rac-spec checkout.
      - name: Checkout rac-spec (Guard 1/2)
        uses: actions/checkout@v4
        with:
          repository: itsthelore/rac-spec
          path: rac-spec

      - name: Guard 1 — vendored spec in sync with rac-spec
        env:
          RAC_SPEC_DIR: ${{ github.workspace }}/rac-spec
        run: python rust/spec/sync_spec.py

      - name: Guard 2 — both engines certified against rac-spec conformance
        env:
          RAC_SPEC_DIR: ${{ github.workspace }}/rac-spec
        run: |
          python rust/tools/conformance_certify.py \
            --engine "python=${{ github.workspace }}/.venv-oracle/bin/rac" \
            --engine "rust=${{ github.workspace }}/rust/target/release/rac"

      # Assert the release dispatcher really execs the native binary: bundle the
      # freshly built binaries and confirm a covered command under
      # RAC_ENGINE=rust matches the Python engine byte-for-byte (native-engine
      # cutover). Bundling happens after the oracle-vs-rust steps above so the
      # Python oracle path stays unaffected there.
      - name: Dispatcher — RAC_ENGINE=rust execs the native binary
        run: |
          cp rust/target/release/rac rust/target/release/rac-mcp src/rac/bin/
          rust_out="$(RAC_ENGINE=rust .venv-oracle/bin/rac validate rac/)"
          py_out="$(RAC_ENGINE=python .venv-oracle/bin/rac validate rac/)"
          if [ "$rust_out" != "$py_out" ]; then
            echo "native dispatch diverged from Python"; exit 1
          fi
          rm -f src/rac/bin/rac src/rac/bin/rac-mcp
          echo "native dispatch OK (byte-identical to Python)"

      - name: Upload scoreboards on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parity-scoreboards
          path: |
            rust/parity-out*/
            rust/mcp-parity-out/

  retrieve-parity:
    name: retrieve + six-tool parity (retrieval-branch oracle)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Tracks the unmerged grounding-retrieval-surface branch; non-blocking
    # until that branch merges (then fold these cases into the main job).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build the retrieval-branch oracle
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: 0.1.dev55+gf2091befd
        run: |
          git fetch origin claude/rac-mcp-retrieval-spec-vmglox
          git worktree add ../oracle-next FETCH_HEAD
          python -m venv .venv-oracle-next
          .venv-oracle-next/bin/pip install --quiet -e ../oracle-next "mcp==1.28.1" "pydantic==2.13.4"
          .venv-oracle-next/bin/rac --version

      - name: cargo build --release
        working-directory: rust
        run: cargo build --release --locked

      - name: retrieve CLI parity (44 cases)
        working-directory: rust
        run: |
          target/release/parity-harness \
            --engine-a ../.venv-oracle-next/bin/rac --engine-b target/release/rac \
            --cases parity-cases-retrieve.json --scoreboard-dir retrieve-out

      - name: MCP wire parity (full six-tool basket)
        working-directory: rust
        run: |
          python3 tools/mcp_parity.py \
            --engine-a "$(pwd)/../.venv-oracle-next/bin/rac mcp" \
            --engine-b "$(pwd)/target/release/rac-mcp" \
            --out mcp-next-out

      - name: Upload scoreboards on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: retrieve-scoreboards
          path: |
            rust/retrieve-out/
            rust/mcp-next-out/
