# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    # Gate the release on the full test suite (reusable workflow). Tests must
    # pass before anything is built or published.
    uses: ./.github/workflows/tests.yml

  verify-release:
    # Fail-closed SemVer gate (REQ-Release-Versioning REQ-007, ADR-111): the
    # release tag must be a well-formed vX.Y.Z identifier (a CalVer YYYY.MM.N tag
    # is rejected) and have a matching CHANGELOG.md entry, or nothing is built or
    # published.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Verify release version and changelog
        run: python -m asdecided.release "${{ github.event.release.tag_name }}"

  release-build:
    needs:
      - test
      - verify-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          # setuptools-scm derives the version from git tags, so we need the
          # full history + tags (the default shallow checkout omits them).
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          # NOTE: put your own distribution build steps here.
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: release-dists
          path: dist/

  # Per-platform wheels bundling the native (Rust) binaries (native-engine
  # cutover, ADR-116). The pure-Python sdist/wheel above stays the universal
  # fallback; these accelerate the covered surface on the three supported
  # platforms. A platform without a native wheel installs the sdist and runs the
  # Python engine — install never depends on a binary. (Cross-platform wheel
  # tagging can need iteration in CI; the sdist path is unaffected either way.)
  native-wheels:
    needs:
      - test
      - verify-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            plat: manylinux2014_x86_64
          - os: macos-14           # Apple Silicon
            plat: macosx_11_0_arm64
          - os: windows-latest
            plat: win_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0            # setuptools-scm needs tags
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install rust toolchain (pinned by rust/rust-toolchain.toml)
        working-directory: rust
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build native binaries with the wheel version compiled in
        shell: bash
        run: |
          python -m pip install --quiet build wheel setuptools-scm
          VER="$(python -m setuptools_scm)"
          echo "native binaries version: $VER"
          ( cd rust && DECIDED_RS_VERSION="$VER" cargo build --release --locked -p decided -p decided-mcp )
      - name: Bundle binaries into asdecided.bin
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp rust/target/release/decided.exe rust/target/release/decided-mcp.exe src/asdecided/bin/
          else
            cp rust/target/release/decided rust/target/release/decided-mcp src/asdecided/bin/
          fi
      - name: Build and platform-tag the wheel
        shell: bash
        run: |
          python -m build --wheel
          # The package bundles binaries but ships no C extension, so setuptools
          # tags the wheel py3-none-any; retag it to this platform so pip picks
          # the wheel carrying the right binary set (iterate here if needed).
          python -m wheel tags --remove \
            --python-tag py3 --abi-tag none --platform-tag "${{ matrix.plat }}" \
            dist/*.whl
      - name: Smoke test — the bundled native path runs
        shell: bash
        run: |
          python -m pip install dist/*.whl
          decided --version
      - name: Upload native wheel
        uses: actions/upload-artifact@v6
        with:
          name: native-wheel-${{ matrix.plat }}
          path: dist/*.whl

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
      - native-wheels
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      # OPTIONAL: uncomment and update to include your PyPI project URL in the deployment status:
      # url: https://pypi.org/p/YOURPROJECT
      #
      # ALTERNATIVE: if your GitHub Release name is the PyPI project version string
      # ALTERNATIVE: exactly, uncomment the following line instead:
      # url: https://pypi.org/project/YOURPROJECT/${{ github.event.release.name }}

    steps:
      - name: Retrieve all distributions (sdist + native wheels)
        uses: actions/download-artifact@v7
        with:
          # release-dists (pure-Python sdist/wheel) + native-wheel-<plat>; each
          # artifact drops its files into dist/, so pip/PyPI sees one set with the
          # universal fallback and the three platform wheels.
          pattern: "{release-dists,native-wheel-*}"
          merge-multiple: true
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  image-publish:
    # Official container image, published in lockstep with the PyPI release
    # (decisions/roadmaps/future/oci-image.md): same trigger, same wheel, same
    # SemVer tag. Runs after pypi-publish so the image never exists for a
    # version PyPI does not have.
    runs-on: ubuntu-latest
    needs:
      - pypi-publish
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/itsthelore/rac
      TAG: ${{ github.event.release.tag_name }}

    steps:
      - uses: actions/checkout@v5

      - name: Retrieve release distributions
        uses: actions/download-artifact@v7
        with:
          name: release-dists
          path: dist/

      - name: Build image
        run: |
          docker build \
            --build-arg DECIDED_VERSION="$TAG" \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            .

      - name: Smoke-test image
        run: docker run --rm "$IMAGE:$TAG" --version

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        run: |
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

      - name: Report pushed digest
        run: docker inspect --format '{{ index .RepoDigests 0 }}' "$IMAGE:$TAG" >> "$GITHUB_STEP_SUMMARY"
