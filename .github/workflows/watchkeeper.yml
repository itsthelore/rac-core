# Reusable Watchkeeper workflow (v0.12.3).
#
# Consumers call this with `uses:` to get product knowledge review on pull
# requests without writing checkout/base-ref wiring themselves:
#
#   jobs:
#     watchkeeper:
#       uses: itsthelore/asdecided-core/.github/workflows/watchkeeper.yml@<tag>
#       with:
#         path: decisions
#
# Pin an exact release tag for reproducible native builds.
name: Watchkeeper

on:
  workflow_call:
    inputs:
      path:
        description: "Corpus directory to compare."
        type: string
        required: false
        default: "decisions"
      base:
        description: "Base revision (empty: origin/<PR base branch>)."
        type: string
        required: false
        default: ""
      fail-on:
        description: "Failure policy: error, warning, or none."
        type: string
        required: false
        default: "error"
      annotate:
        description: "Emit inline annotations."
        type: boolean
        required: false
        default: true

permissions:
  contents: read

jobs:
  watchkeeper:
    name: watchkeeper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # The comparison needs the base revision's history.
          fetch-depth: 0

      # Reusable workflows run in the caller's repository, so the action is
      # referenced by full path. Update this ref when cutting a release tag;
      # until the first v0.12.x release it tracks main.
      - uses: itsthelore/asdecided-core@main
        with:
          path: ${{ inputs.path }}
          base: ${{ inputs.base }}
          fail-on: ${{ inputs.fail-on }}
          annotate: ${{ inputs.annotate }}
